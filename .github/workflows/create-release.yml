name: Create Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (check version and build without releasing)'
        required: false
        default: false
        type: boolean

# Serialize releases so a fast second merge can't race the tag/bump of the first.
concurrency:
  group: create-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      released: ${{ steps.checktag.outputs.release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from CMakeLists.txt
        id: version
        run: |
          VERSION=$(grep -oP 'set\(PROJECT_VER\s*"\K[^"]+' CMakeLists.txt)
          if [ -z "$VERSION" ]; then
            echo "::error::Could not extract PROJECT_VER from CMakeLists.txt"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Found version: $VERSION (tag: v$VERSION)"

      - name: Check if tag already exists
        id: checktag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::notice::Tag $TAG already exists — skipping release. Bump PROJECT_VER in CMakeLists.txt to cut a new one."
            echo "release=false" >> $GITHUB_OUTPUT
          else
            echo "✅ Tag $TAG does not exist yet — will release"
            echo "release=true" >> $GITHUB_OUTPUT
          fi

      - name: ESP-IDF Build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4.3
          target: esp32s3
          path: '.'

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "🔍 Dry run complete — version ${{ steps.version.outputs.version }}, build OK, no release created."

      - name: Create and push tag
        if: ${{ !inputs.dry_run && steps.checktag.outputs.release == 'true' }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "$TAG"

      - name: Generate changelog from conventional commits
        if: ${{ !inputs.dry_run && steps.checktag.outputs.release == 'true' }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -n1)
          RANGE="HEAD"; [ -n "$PREV_TAG" ] && RANGE="${PREV_TAG}..HEAD"
          FEATURES=$(git log ${RANGE} --oneline --no-merges --grep="^feat" | sed 's/^[a-f0-9]* feat[^:]*: //' || true)
          FIXES=$(git log ${RANGE} --oneline --no-merges --grep="^fix" | sed 's/^[a-f0-9]* fix[^:]*: //' || true)
          {
            echo "## mitsubishi-heatpump ${TAG}"
            echo ""
            if [ -n "$FEATURES" ]; then echo "### ✨ Features"; echo "$FEATURES" | while IFS= read -r l; do echo "- $l"; done; echo ""; fi
            if [ -n "$FIXES" ]; then echo "### 🐛 Fixes"; echo "$FIXES" | while IFS= read -r l; do echo "- $l"; done; echo ""; fi
            echo "---"
            echo ""
            echo "### Flashing (USB)"
            echo '```bash'
            echo "esptool.py --chip esp32s3 write_flash \\"
            echo "  0x0 bootloader.bin \\"
            echo "  0x8000 partition-table.bin \\"
            echo "  0xf000 ota_data_initial.bin \\"
            echo "  0x20000 mitsubishi-heatpump.bin"
            echo '```'
          } > /tmp/release_body.md
          cat /tmp/release_body.md

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run && steps.checktag.outputs.release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: mitsubishi-heatpump ${{ steps.version.outputs.tag }}
          body_path: /tmp/release_body.md
          draft: false
          files: |
            build/mitsubishi-heatpump.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/ota_data_initial.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # After a successful release, pre-increment the patch version on main so the
  # next release has a fresh tag (mirrors the bump-main job in pygemstone /
  # pynapoleon / agora). Skipped on dry runs.
  bump-main:
    needs: build-and-release
    if: ${{ !inputs.dry_run && needs.build-and-release.outputs.released == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # Push the version bump via the shared VERSION_BUMP_TOKEN PAT
          # (fine-grained, contents:write). No GITHUB_TOKEN fallback: fail
          # loudly if the secret is missing rather than silently downgrading
          # to github-actions[bot] and hiding the misconfig.
          token: ${{ secrets.VERSION_BUMP_TOKEN }}

      - name: Bump patch version and push
        run: |
          set -euo pipefail
          current=$(grep -oP 'set\(PROJECT_VER\s*"\K[^"]+' CMakeLists.txt)
          IFS=. read -r major minor patch <<< "$current"
          next="${major}.${minor}.$((patch + 1))"
          echo "Bumping: $current -> $next"
          sed -i -E "s/set\(PROJECT_VER[[:space:]]*\"[^\"]+\"\)/set(PROJECT_VER \"$next\")/" CMakeLists.txt
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CMakeLists.txt
          git commit -m "chore: bump version to $next [skip ci]" \
                     -m "Auto-bumped by create-release.yml after ${{ needs.build-and-release.outputs.tag }}." \
                     -m "Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git push origin HEAD:main
