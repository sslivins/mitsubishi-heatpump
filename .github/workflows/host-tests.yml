name: host-tests

on:
  push:
    branches: [main]
    paths:
      - 'components/hvac_mqtt/hvac_topics.cpp'
      - 'components/hvac_mqtt/include/hvac_topics.h'
      - 'components/hvac_group/group_proto.cpp'
      - 'components/hvac_group/include/group_proto.h'
      - 'test/host/**'
      - '.github/workflows/host-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'components/hvac_mqtt/hvac_topics.cpp'
      - 'components/hvac_mqtt/include/hvac_topics.h'
      - 'components/hvac_group/group_proto.cpp'
      - 'components/hvac_group/include/group_proto.h'
      - 'test/host/**'
      - '.github/workflows/host-tests.yml'

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run host unit tests
        shell: bash
        run: |
          g++ -std=c++17 -Wall -Wextra \
            -I components/hvac_mqtt/include \
            components/hvac_mqtt/hvac_topics.cpp \
            test/host/test_hvac_topics.cpp \
            -o host_tests
          ./host_tests

      - name: Build and run host group-protocol tests
        shell: bash
        run: |
          g++ -std=c++17 -Wall -Wextra \
            -I components/hvac_group/include \
            components/hvac_group/group_proto.cpp \
            test/host/test_group_proto.cpp \
            -o group_tests
          ./group_tests
